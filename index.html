<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Health Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #12181A;
    --bg-elevated: #1B2326;
    --border: #2A3438;
    --text: #EDF2F2;
    --text-dim: #8FA0A3;
    --accent: #4FB8A6;
    --accent-dim: #2E6B61;
    --danger: #E0785F;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  }
  #app {
    display: flex; flex-direction: column; height: 100vh; height: 100dvh;
  }
  header {
    padding: 18px 20px 12px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 22px; font-weight: 700; margin: 0 0 2px;
    letter-spacing: -0.02em;
  }
  header .date {
    font-size: 13px; color: var(--text-dim);
  }

  #summary-strip {
    display: flex; gap: 10px; overflow-x: auto; padding: 4px 20px 14px;
    flex-shrink: 0; -webkit-overflow-scrolling: touch;
  }
  #summary-strip::-webkit-scrollbar { display: none; }
  .summary-chip {
    flex-shrink: 0; width: 72px; display: flex; flex-direction: column; align-items: center;
    gap: 4px;
  }
  .summary-circle {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--bg-elevated); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; text-align: center; line-height: 1.1;
    color: var(--text);
  }
  .summary-circle.has-value { border-color: var(--accent); }
  .summary-circle.notable { border-color: var(--danger); }
  .summary-label {
    font-size: 10px; color: var(--text-dim); text-align: center;
  }
  #feed {
    flex: 1; overflow-y: auto; padding: 8px 16px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #feed:empty::before {
    content: "Скажи или сфотографируй — покажу здесь";
    color: var(--text-dim); font-size: 14px;
    display: block; text-align: center; margin-top: 40px;
  }
  .card {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    font-size: 15px; line-height: 1.45; animation: rise 0.2s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .card.user { background: var(--accent-dim); align-self: flex-end; max-width: 85%; color: #fff; }
  .card.system { align-self: flex-start; max-width: 92%; }
  .card .transcript { color: var(--text-dim); font-size: 13px; margin-bottom: 6px; font-style: italic; }
  .card-title { font-weight: 600; margin-bottom: 6px; }
  .field-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-row label { color: var(--text-dim); font-size: 13px; flex-shrink: 0; }
  .field-row input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 6px 8px; font-size: 14px; width: 100px; text-align: right;
  }
  .card-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn {
    border: none; border-radius: 10px; padding: 10px 14px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #06201C; flex: 1; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }

  .chart-wrap svg { width: 100%; height: 110px; display: block; }
  .chart-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .chart-value { font-size: 24px; font-weight: 700; margin: 2px 0 8px; }

  #bottom-bar {
    flex-shrink: 0; padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    display: flex; align-items: center; justify-content: center; gap: 20px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .round-btn {
    width: 64px; height: 64px; border-radius: 50%;
    border: none; display: flex; align-items: center; justify-content: center;
    background: var(--accent); color: #06201C;
    box-shadow: 0 4px 20px rgba(79,184,166,0.35);
    font-size: 26px; cursor: pointer; transition: transform 0.12s;
  }
  .round-btn:active { transform: scale(0.92); }
  .round-btn.recording { background: var(--danger); box-shadow: 0 4px 20px rgba(224,120,95,0.4); animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  #plus-btn {
    width: 48px; height: 48px; background: var(--bg-elevated);
    color: var(--text); border: 1px solid var(--border); font-size: 22px;
  }

  #plus-sheet {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; z-index: 50;
  }
  #plus-sheet.open { display: flex; }
  #plus-sheet .sheet {
    background: var(--bg-elevated); width: 100%;
    border-radius: 20px 20px 0 0; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  #plus-sheet .sheet button {
    width: 100%; background: none; border: none; color: var(--text);
    font-size: 17px; padding: 16px 24px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  #plus-sheet .sheet button:last-child { border-bottom: none; color: var(--text-dim); }

  #status-toast {
    position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
    background: var(--bg-elevated); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 100px; font-size: 13px; color: var(--text-dim);
    display: none;
  }
  #status-toast.show { display: block; }

  #metric-detail {
    position: fixed; inset: 0; background: var(--bg);
    display: none; flex-direction: column; z-index: 60;
    padding-top: env(safe-area-inset-top);
  }
  #metric-detail.open { display: flex; }
#pharmacy-screen { position: fixed; inset: 0; background: var(--bg,#000); z-index: 100; display: none; flex-direction: column; }
#pharmacy-screen.open { display: flex; }
#pharmacy-screen .detail-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
#pharmacy-screen .detail-body { flex: 1; overflow-y: auto; padding: 4px 16px 24px; }
.pharmacy-item { padding: 12px 14px; border-radius: 12px; background: var(--bg-elevated,#1c1c1e); margin-bottom: 8px; }
.pharmacy-item-name { font-size: 16px; font-weight: 600; }
.pharmacy-item-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  #metric-detail .detail-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px 8px;
  }
  #metric-detail .detail-back {
    background: var(--bg-elevated); border: 1px solid var(--border);
    color: var(--text); width: 36px; height: 36px; border-radius: 50%;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
  }
  #metric-detail .detail-title { font-size: 18px; font-weight: 700; }
  #metric-detail .detail-body { flex: 1; overflow-y: auto; padding: 4px 16px 24px; }
  #metric-detail .detail-value { font-size: 32px; font-weight: 700; margin: 6px 0 2px; }
  #metric-detail .detail-range { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
  .period-tabs {
    display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto;
  }
  .period-tabs button {
    flex-shrink: 0; background: var(--bg-elevated); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 100px; padding: 6px 14px;
    font-size: 13px; cursor: pointer;
  }
  .period-tabs button.active { background: var(--accent); border-color: var(--accent); color: #06201C; font-weight: 600; }
  #metric-detail .detail-chart-wrap svg { width: 100%; height: 160px; display: block; }
  .detail-history { margin-top: 18px; }
  .detail-history h3 { font-size: 13px; color: var(--text-dim); font-weight: 600; margin-bottom: 8px; }
  .history-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-row .h-date { color: var(--text-dim); }
  .summary-circle { cursor: pointer; }

  #calendar-strip {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 16px 10px;
  }
  #week-row {
    flex: 1; display: flex; justify-content: space-between;
  }
  .week-day {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 4px 6px; border-radius: 10px; cursor: pointer;
    min-width: 32px;
  }
  .week-day .wd-label { font-size: 10px; color: var(--text-dim); }
  .week-day .wd-num {
    font-size: 14px; font-weight: 600; color: var(--text);
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .week-day.today .wd-num { background: var(--accent); color: #06201C; }
  .week-day .wd-dot {
    width: 4px; height: 4px; border-radius: 50%; background: transparent;
  }
  .week-day.has-activity .wd-dot { background: var(--accent); }
  #calendar-toggle {
    background: none; border: none; color: var(--text-dim);
    font-size: 26px; font-weight: 700; padding: 6px; cursor: pointer; flex-shrink: 0;
    line-height: 1; transition: transform 0.2s;
  }
  #calendar-toggle.open { transform: rotate(180deg); }

  #calendar-month {
    overflow: hidden; max-height: 0; transition: max-height 0.25s ease;
    padding: 0 16px;
  }
  #summary-strip-more {
    display: flex; flex-wrap: wrap; gap: 10px;
    overflow: hidden; max-height: 0; transition: max-height 0.25s ease;
    padding: 0 20px;
  }
  #summary-strip-more.open { max-height: 400px; padding: 4px 20px 14px; }
  #chips-toggle {
    background: none; border: none; color: var(--text-dim);
    font-size: 26px; font-weight: 700; padding: 6px; cursor: pointer;
    line-height: 1; transition: transform 0.2s;
  }
  #chips-toggle.open { transform: rotate(180deg); }
  #calendar-month.open { max-height: 320px; padding: 4px 16px 14px; }
  .month-grid-labels, .month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .month-grid-labels div {
    text-align: center; font-size: 10px; color: var(--text-dim); padding-bottom: 4px;
  }
  .month-cell {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 4px 0; cursor: pointer; border-radius: 8px;
  }
  .month-cell .mc-num {
    font-size: 13px; width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; color: var(--text);
  }
  .month-cell.other-month .mc-num { color: var(--border); }
  .month-cell.today .mc-num { background: var(--accent); color: #06201C; }
  .month-cell .mc-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
  .month-cell.has-activity .mc-dot { background: var(--accent); }

  #reminder-ticker {
    display: none; overflow: hidden; white-space: nowrap;
    background: var(--bg-elevated); border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 0; cursor: pointer; flex-shrink: 0;
  }
  #reminder-ticker.show { display: block; }
  #reminder-ticker-track {
    display: inline-block; padding-left: 100%;
    animation: ticker-scroll 18s linear infinite;
    font-size: 13px; color: var(--danger);
  }
  #reminder-ticker-track span { margin-right: 40px; }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
  .reminder-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .reminder-row:last-child { border-bottom: none; }
  .reminder-dismiss {
    background: var(--bg); border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="greeting">Привет</h1>
  </header>

  <div id="calendar-strip">
    <div id="week-row"></div>
    <button id="calendar-toggle">⌄</button>
  </div>
  <div id="calendar-month">
    <div class="month-grid-labels">
      <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
    </div>
    <div class="month-grid" id="month-grid"></div>
  </div>

  <div id="summary-strip"></div>
  <div id="summary-strip-more"></div>
  <div style="display:flex;justify-content:center;">
    <button id="chips-toggle">&#8964;</button>
  </div>

  <div id="reminder-ticker">
    <div id="reminder-ticker-track"></div>
  </div>

  <div id="feed"></div>

  <div id="status-toast"></div>

  <div id="bottom-bar">
    <button class="round-btn" id="plus-btn">+</button>
    <button class="round-btn" id="mic-btn">🎤</button>
  </div>
</div>

<div id="plus-sheet">
  <div class="sheet">
    <button id="btn-camera">📷 Камера</button>
    <button id="btn-gallery">🖼 Фото из галереи</button>
    <button id="btn-file">📁 Файл (Excel / CSV / PDF)</button>
    <button id="btn-cancel">Отмена</button>
  </div>
</div>

<input type="file" id="input-camera" accept="image/*" capture="environment" style="display:none">
<input type="file" id="input-gallery" accept="image/*" style="display:none">
<input type="file" id="input-file" accept=".xlsx,.csv,.pdf,.docx" style="display:none">

<div id="metric-detail">
  <div class="detail-header">
    <button class="detail-back" id="detail-back">←</button>
    <div class="detail-title" id="detail-title">—</div>
  </div>
  <div class="detail-body">
    <div class="detail-value" id="detail-value">—</div>
    <div class="detail-range" id="detail-range"></div>
    <div class="period-tabs" id="period-tabs">
      <button data-period="7d">7 дней</button>
      <button data-period="30d">30 дней</button>
      <button data-period="3m">3 мес</button>
      <button data-period="1y">Год</button>
      <button data-period="all" class="active">Всё время</button>
    </div>
    <div class="detail-chart-wrap" id="detail-chart-wrap"></div>
    <div class="detail-history">
      <h3>История</h3>
      <div id="detail-history-list"></div>
    </div>
  </div>
</div>

<div id="pharmacy-screen">
  <div class="detail-header">
    <button class="detail-back" id="pharmacy-back">←</button>
    <div class="detail-title">Аптека</div>
  </div>
  <div class="detail-body">
    <input type="text" id="pharmacy-search" placeholder="Поиск препарата..." autocomplete="off" style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--border,#333);background:var(--bg-elevated,#1c1c1e);color:inherit;font-size:16px;margin-bottom:14px;">
    <div id="pharmacy-results"></div>
    <div id="pharmacy-dose-form" style="display:none;margin-top:16px;">
      <div id="pharmacy-selected-name" style="font-size:18px;font-weight:700;margin-bottom:10px;"></div>
      <input type="number" id="pharmacy-dose-value" placeholder="Доза" style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--border,#333);background:var(--bg-elevated,#1c1c1e);color:inherit;font-size:16px;margin-bottom:10px;">
      <input type="text" id="pharmacy-dose-unit" placeholder="Ед. изм. (мг, таб, мл...)" style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--border,#333);background:var(--bg-elevated,#1c1c1e);color:inherit;font-size:16px;margin-bottom:10px;">
      <div id="pharmacy-existing-schedule" style="display:none;margin-bottom:10px;padding:10px;border-radius:12px;background:var(--bg-elevated,#1c1c1e);"></div>
      <div style="font-size:14px;color:var(--text-dim,#999);margin-bottom:6px;">Время приёма (необязательно)</div>
      <input type="time" id="pharmacy-time-1" style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--border,#333);background:var(--bg-elevated,#1c1c1e);color:inherit;font-size:16px;margin-bottom:8px;">
      <input type="time" id="pharmacy-time-2" style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--border,#333);background:var(--bg-elevated,#1c1c1e);color:inherit;font-size:16px;margin-bottom:8px;">
      <input type="number" id="pharmacy-interval-days" placeholder="Раз в N дней (по умолчанию 1)" style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--border,#333);background:var(--bg-elevated,#1c1c1e);color:inherit;font-size:16px;margin-bottom:10px;">
      <button id="pharmacy-save-btn" style="width:100%;padding:12px;border-radius:12px;border:none;background:var(--accent,#0a84ff);color:#fff;font-size:16px;font-weight:600;">Записать приём</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

const API_BASE = "https://worker-production-931b.up.railway.app/api";

function initDataHeader() {
  return tg?.initData || "";
}

let pharmacySelected = null;
let pharmacySearchTimer = null;

function openPharmacyScreen() {
  document.getElementById("pharmacy-screen").classList.add("open");
  document.getElementById("pharmacy-search").value = "";
  document.getElementById("pharmacy-results").innerHTML = "";
  document.getElementById("pharmacy-dose-form").style.display = "none";
  pharmacySelected = null;
  document.getElementById("pharmacy-search").focus();
}

function closePharmacyScreen() {
  document.getElementById("pharmacy-screen").classList.remove("open");
  document.getElementById("pharmacy-time-1").value = "";
  document.getElementById("pharmacy-time-2").value = "";
  document.getElementById("pharmacy-interval-days").value = "";
  document.getElementById("pharmacy-existing-schedule").style.display = "none";
}

async function pharmacySearch(q) {
  const resultsEl = document.getElementById("pharmacy-results");
  if (!q || q.length < 2) { resultsEl.innerHTML = ""; return; }
  try {
    const data = await apiFetch(`/pharmacy/search?q=${encodeURIComponent(q)}`, { method: "GET" });
    const items = data.results || data || [];
    if (!items.length) {
      resultsEl.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">Ничего не найдено</div>`;
      return;
    }
    resultsEl.innerHTML = items.map((it, i) => `
      <div class="pharmacy-item" data-idx="${i}">
        <div class="pharmacy-item-name">${it.name}</div>
        <div class="pharmacy-item-meta">${it.category || ""} ${it.form ? "· " + it.form : ""} ${it.common_dosages ? "· " + it.common_dosages : ""}</div>
      </div>
    `).join("");
    resultsEl.querySelectorAll(".pharmacy-item").forEach(el => {
      el.addEventListener("click", () => {
        const item = items[Number(el.dataset.idx)];
        pharmacySelected = item;
        document.getElementById("pharmacy-selected-name").textContent = item.name;
        document.getElementById("pharmacy-dose-form").style.display = "block";
        document.getElementById("pharmacy-dose-value").value = "";
        document.getElementById("pharmacy-dose-unit").value = "";
        checkExistingSchedule(item.name);
      });
    });
  } catch (e) {
    resultsEl.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">Ошибка поиска</div>`;
  }
}

document.getElementById("pharmacy-back").addEventListener("click", closePharmacyScreen);

document.getElementById("pharmacy-search").addEventListener("input", (e) => {
  clearTimeout(pharmacySearchTimer);
  const q = e.target.value;
  pharmacySearchTimer = setTimeout(() => pharmacySearch(q), 300);
});

document.getElementById("pharmacy-save-btn").addEventListener("click", async () => {
  if (!pharmacySelected) return;
  const doseValue = document.getElementById("pharmacy-dose-value").value;
  const doseUnit = document.getElementById("pharmacy-dose-unit").value;
  try {
    await apiFetch("/medications", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        med_name: pharmacySelected.name,
        dose_value: doseValue ? Number(doseValue) : null,
        dose_unit: doseUnit || null,
        med_type: pharmacySelected.category || "other",
      }),
    });
    const t1 = document.getElementById("pharmacy-time-1").value;
    const t2 = document.getElementById("pharmacy-time-2").value;
    const times = [t1, t2].filter(Boolean);
    const intervalDays = Number(document.getElementById("pharmacy-interval-days").value) || 1;
    if (times.length) {
      try {
        await apiFetch("/therapy/schedules", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: pharmacySelected.name,
            type: pharmacySelected.category || "medication",
            interval_days: intervalDays,
            times: times,
          }),
        });
      } catch (e) {}
    }
    closePharmacyScreen();
    if (typeof loadSummary === "function") loadSummary();
  } catch (e) {
    alert("Не удалось сохранить приём");
  }
});

async function checkExistingSchedule(medName) {
  const box = document.getElementById("pharmacy-existing-schedule");
  box.style.display = "none";
  box.innerHTML = "";
  try {
    const list = await apiFetch("/therapy/schedules", { method: "GET" });
    const matches = list.filter(s => s.name.toLowerCase() === medName.toLowerCase());
    if (!matches.length) return;
    const timesStr = matches.map(m => m.time).filter(Boolean).join(", ");
    box.innerHTML = `<div style="margin-bottom:8px;">Уже есть расписание: ${timesStr || "без времени"}</div>
      <button id="schedule-delete-btn" style="padding:8px 14px;border-radius:10px;border:none;background:#ff3b30;color:#fff;font-size:14px;margin-right:8px;">Удалить</button>`;
    box.style.display = "block";
    document.getElementById("schedule-delete-btn").addEventListener("click", async () => {
      for (const m of matches) {
        await apiFetch(`/therapy/schedules/${m.id}`, { method: "DELETE" });
      }
      checkExistingSchedule(medName);
    });
  } catch (e) {}
}

  const headers = options.headers || {};
  headers["X-Telegram-Init-Data"] = initDataHeader();
  const res = await fetch(API_BASE + path, { ...options, headers });
  return res.json();
}

let currentMetricSeries = [];
let currentMetricMeta = {};
let currentMetricIsBp = false;
let currentMetricBand = null;       // { low, high, label } for single-series fields
let currentMetricBands = null;      // { sys: {low,high,label}, dia: {...} } for bp

// Общепринятые ориентировочные диапазоны (не персональный диагноз, просто
// чтобы на графике было видно, где "обычно нормально", а где выброс.
const CLINICAL_BANDS = {
  pulse: { low: 60, high: 100, label: "норма покоя: 60–100" },
  bp_sys: { low: 90, high: 120, label: "ориентир: 90–120" },
  bp_dia: { low: 60, high: 80, label: "ориентир: 60–80" },
};

function filterByPeriod(series, period) {
  if (period === "all") return series;
  const now = new Date();
  const cutoff = new Date(now);
  if (period === "7d") cutoff.setDate(now.getDate() - 7);
  else if (period === "30d") cutoff.setDate(now.getDate() - 30);
  else if (period === "3m") cutoff.setMonth(now.getMonth() - 3);
  else if (period === "1y") cutoff.setFullYear(now.getFullYear() - 1);

  const cut = (arr) => (arr || []).filter(p => {
    const d = new Date(Array.isArray(p) ? p[0] : p.date);
    return d >= cutoff;
  });

  if (currentMetricIsBp) {
    return { sys: cut(series.sys), dia: cut(series.dia) };
  }
  return cut(series);
}

function buildLinePath(points, yMin, yMax, W, H) {
  const coords = points.map((p, i) => {
    const x = points.length === 1 ? W / 2 : (i / (points.length - 1)) * W;
    const y = H - ((parseFloat(p[1]) - yMin) / (yMax - yMin)) * H;
    return [x, y];
  });
  const pathD = coords.map((c, i) => (i === 0 ? "M" : "L") + c[0].toFixed(1) + "," + c[1].toFixed(1)).join(" ");
  return { coords, pathD };
}

function yOf(value, yMin, yMax, H) {
  return H - ((value - yMin) / (yMax - yMin)) * H;
}

function isOut(value, band) {
  if (!band) return false;
  return value < band.low || value > band.high;
}

function computeYRange(valueArrays, bands) {
  const all = [].concat(...valueArrays).filter(v => !isNaN(v));
  (bands || []).forEach(b => { if (b) { all.push(b.low); all.push(b.high); } });
  const min = Math.min(...all);
  const max = Math.max(...all);
  const pad = (max - min) * 0.15 || (bands && bands[0] ? bands[0].high * 0.1 : 5);
  return { yMin: min - pad, yMax: max + pad };
}

function bandRectSvg(band, yMin, yMax, W, H) {
  if (!band) return "";
  const yTop = Math.max(0, yOf(band.high, yMin, yMax, H));
  const yBottom = Math.min(H, yOf(band.low, yMin, yMax, H));
  return `<rect x="0" y="${yTop.toFixed(1)}" width="${W}" height="${(yBottom - yTop).toFixed(1)}" fill="#4FB8A6" opacity="0.10"/>`;
}

function axisLabelsSvg(yMin, yMax, H, W) {
  return `
    <text x="${W - 4}" y="12" text-anchor="end" font-size="10" fill="#8FA0A3">${Math.round(yMax)}</text>
    <text x="${W - 4}" y="${H - 4}" text-anchor="end" font-size="10" fill="#8FA0A3">${Math.round(yMin)}</text>
  `;
}

function renderDetailChart(series) {
  if (currentMetricIsBp) {
    renderBpChart(series);
    return;
  }
  const points = (series || []).map(p => Array.isArray(p) ? p : [p.date, p.value]);
  if (!points.length) {
    detailChartWrap.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">Нет данных за этот период</div>`;
    detailHistoryList.innerHTML = "";
    return;
  }
  const values = points.map(p => parseFloat(p[1])).filter(v => !isNaN(v));
  const band = currentMetricBand;
  const { yMin, yMax } = computeYRange([values], [band]);
  const W = 320, H = 160;

  const { coords, pathD } = buildLinePath(points, yMin, yMax, W, H);
  const dots = coords.map((c, i) => {
    const v = parseFloat(points[i][1]);
    const color = isOut(v, band) ? "#E0785F" : "#4FB8A6";
    const r = isOut(v, band) ? 4 : 3;
    return `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="${r}" fill="${color}"/>`;
  }).join("");

  detailChartWrap.innerHTML = `
    ${band ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px;"><span style="color:#4FB8A6;">▬</span> ${band.label}</div>` : ""}
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${bandRectSvg(band, yMin, yMax, W, H)}
      ${axisLabelsSvg(yMin, yMax, H, W)}
      <path d="${pathD}" fill="none" stroke="#4FB8A6" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
      ${dots}
    </svg>
  `;

  const last = points[points.length - 1];
  const lastOut = isOut(parseFloat(last[1]), band);
  detailValue.innerHTML = lastOut
    ? `${last[1]} <span style="font-size:14px;color:#E0785F;">вне нормы</span>`
    : `${last[1]}`;

  detailHistoryList.innerHTML = points.slice().reverse().map(p => {
    const out = isOut(parseFloat(p[1]), band);
    return `
    <div class="history-row">
      <span class="h-date">${formatTime(p[0])}</span>
      <span class="h-val" style="${out ? 'color:#E0785F;font-weight:700;' : ''}">${p[1]}</span>
    </div>
  `;
  }).join("");
}

function renderBpChart(series) {
  const sysPoints = (series.sys || []).map(p => Array.isArray(p) ? p : [p.date, p.value]);
  const diaPoints = (series.dia || []).map(p => Array.isArray(p) ? p : [p.date, p.value]);
  if (!sysPoints.length && !diaPoints.length) {
    detailChartWrap.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">Нет данных за этот период</div>`;
    detailHistoryList.innerHTML = "";
    return;
  }
  const sysBand = currentMetricBands?.sys || null;
  const diaBand = currentMetricBands?.dia || null;
  const sysValues = sysPoints.map(p => parseFloat(p[1]));
  const diaValues = diaPoints.map(p => parseFloat(p[1]));
  const { yMin, yMax } = computeYRange([sysValues, diaValues], [sysBand, diaBand]);
  const W = 320, H = 160;

  const sys = buildLinePath(sysPoints, yMin, yMax, W, H);
  const dia = buildLinePath(diaPoints, yMin, yMax, W, H);
  const sysDots = sys.coords.map((c, i) => {
    const v = sysValues[i];
    const out = isOut(v, sysBand);
    return `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="${out ? 4 : 2.5}" fill="${out ? '#E0785F' : '#4FB8A6'}"/>`;
  }).join("");
  const diaDots = dia.coords.map((c, i) => {
    const v = diaValues[i];
    const out = isOut(v, diaBand);
    return `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="${out ? 4 : 2.5}" fill="${out ? '#E0785F' : '#E8A57A'}"/>`;
  }).join("");

  detailChartWrap.innerHTML = `
    <div style="display:flex;gap:14px;font-size:12px;color:var(--text-dim);margin-bottom:6px;flex-wrap:wrap;">
      <span><span style="color:#4FB8A6;">●</span> сист. ${sysBand ? `(${sysBand.label})` : ""}</span>
      <span><span style="color:#E8A57A;">●</span> диаст. ${diaBand ? `(${diaBand.label})` : ""}</span>
      <span><span style="color:#E0785F;">●</span> вне ориентира</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${bandRectSvg(sysBand, yMin, yMax, W, H)}
      ${axisLabelsSvg(yMin, yMax, H, W)}
      <path d="${sys.pathD}" fill="none" stroke="#4FB8A6" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
      <path d="${dia.pathD}" fill="none" stroke="#E8A57A" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
      ${sysDots}${diaDots}
    </svg>
  `;

  const lastSys = sysPoints[sysPoints.length - 1];
  const lastDia = diaPoints[diaPoints.length - 1];
  detailValue.textContent = (lastSys && lastDia) ? `${lastSys[1]}/${lastDia[1]}` : "—";

  const byDate = {};
  sysPoints.forEach(p => { byDate[p[0]] = byDate[p[0]] || {}; byDate[p[0]].sys = p[1]; });
  diaPoints.forEach(p => { byDate[p[0]] = byDate[p[0]] || {}; byDate[p[0]].dia = p[1]; });
  const dates = Object.keys(byDate).sort().reverse();

  detailHistoryList.innerHTML = dates.map(d => {
    const sysOut = isOut(parseFloat(byDate[d].sys), sysBand);
    const diaOut = isOut(parseFloat(byDate[d].dia), diaBand);
    const flagged = sysOut || diaOut;
    return `
    <div class="history-row">
      <span class="h-date">${formatTime(d)}</span>
      <span class="h-val" style="${flagged ? 'color:#E0785F;font-weight:700;' : ''}">${byDate[d].sys ?? "—"}/${byDate[d].dia ?? "—"}</span>
    </div>
  `;
  }).join("");
}

async function openMetricDetail(field, label, fromLabsList = false) {
  cameFromLabsList = fromLabsList;
  detailTitle.textContent = label;
  detailValue.textContent = "…";
  detailRange.textContent = "";
  detailChartWrap.innerHTML = "";
  detailHistoryList.innerHTML = "";
  currentMetricIsBp = (field === "bp");
  currentMetricBand = null;
  currentMetricBands = null;
  const isMeds = (field === "__meds__");
  const isLabsList = (field === "__labs__");
  const isDay = field.startsWith("__day__:");
  const isReminders = (field === "__reminders__");
  periodTabs.style.display = (isMeds || isLabsList || isDay || isReminders) ? "none" : "";
  periodTabs.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.period === "all"));
  metricDetail.classList.add("open");

  if (isDay) {
    const iso = field.split(":")[1];
    detailValue.textContent = "";
    try {
      const data = await apiFetch(`/day/${iso}`, { method: "GET" });
      const rows = [];
      (data.vitals || []).forEach(v => {
        if (v.weight != null) rows.push({ label: "Вес", val: `${v.weight} кг`, time: v.time });
        if (v.bp_sys != null && v.bp_dia != null) rows.push({ label: "Давление", val: `${v.bp_sys}/${v.bp_dia}`, time: v.time });
        if (v.pulse != null) rows.push({ label: "Пульс", val: `${v.pulse}`, time: v.time });
        if (v.steps != null) rows.push({ label: "Шаги", val: `${v.steps}`, time: v.time });
        if (v.injection_compound) rows.push({ label: `💉 ${v.injection_compound}`, val: v.injection_dose || "", time: v.time });
      });
      (data.medications || []).forEach(m => rows.push({ label: m.name, val: m.dose || "", time: m.time }));
      (data.labs || []).forEach(l => rows.push({ label: l.test_name, val: `${l.value}${l.unit ? " " + l.unit : ""}`, time: null }));

      if (!rows.length) {
        detailHistoryList.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">В этот день записей нет</div>`;
        return;
      }
      detailHistoryList.innerHTML = rows.map(r => `
        <div class="history-row">
          <span class="h-date">${r.time ? formatTime(r.time) + " — " : ""}${r.label}</span>
          <span class="h-val">${r.val}</span>
        </div>
      `).join("");
    } catch (e) {
      detailHistoryList.innerHTML = `<div style="color:var(--text-dim);">Не удалось загрузить данные</div>`;
    }
    return;
  }

  if (isReminders) {
    detailValue.textContent = "";
    try {
      const data = lastReminders && (lastReminders.missing_today?.length || lastReminders.injections?.length)
        ? lastReminders
        : await apiFetch(`/reminders`, { method: "GET" });

      const missing = data.missing_today || [];
      const injections = data.injections || [];

      if (!missing.length && !injections.length) {
        detailHistoryList.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">Активных напоминаний нет</div>`;
        return;
      }

      let html = "";
      missing.forEach(m => {
        html += `
        <div class="reminder-row">
          <span>Не принял сегодня: <b>${m.med_name}</b></span>
          <button class="reminder-dismiss" data-dismiss="${m.med_name.replace(/"/g, '&quot;')}">Не напоминать</button>
        </div>`;
      });
      injections.forEach(i => {
        const text = i.days_left <= 0 ? `Пора: ${i.compound}` : `${i.compound}: через ${i.days_left} дн.`;
        html += `<div class="reminder-row"><span>💉 ${text}</span></div>`;
      });
      detailHistoryList.innerHTML = html;

      detailHistoryList.querySelectorAll(".reminder-dismiss").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          btn.textContent = "...";
          try {
            await apiFetch(`/reminders/dismiss`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ med_name: btn.dataset.dismiss }),
            });
            await refreshReminders();
            openMetricDetail("__reminders__", "Напоминания");
          } catch (e) {
            btn.disabled = false;
            btn.textContent = "Не напоминать";
          }
        });
      });
    } catch (e) {
      detailHistoryList.innerHTML = `<div style="color:var(--text-dim);">Не удалось загрузить данные</div>`;
    }
    return;
  }

  if (isLabsList) {
    detailValue.textContent = "";
    try {
      const rows = await apiFetch(`/indicators/latest`, { method: "GET" });
      if (!Array.isArray(rows) || !rows.length) {
        detailHistoryList.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">Анализов пока нет</div>`;
        return;
      }
      detailHistoryList.innerHTML = rows.map(r => {
        const out = (r.reference_low != null && r.value < r.reference_low) ||
                    (r.reference_high != null && r.value > r.reference_high);
        return `
        <div class="history-row" data-test-name="${r.test_name.replace(/"/g, '&quot;')}" style="cursor:pointer;">
          <span class="h-date">${r.test_name}</span>
          <span class="h-val" style="${out ? 'color:#E0785F;font-weight:700;' : ''}">${r.value}${r.unit ? " " + r.unit : ""}</span>
        </div>
      `;
      }).join("");
      detailHistoryList.querySelectorAll(".history-row[data-test-name]").forEach(el => {
        el.addEventListener("click", () => {
          const name = el.dataset.testName;
          openMetricDetail(name, name, true);
        });
      });
    } catch (e) {
      detailHistoryList.innerHTML = `<div style="color:var(--text-dim);">Не удалось загрузить данные</div>`;
    }
    return;
  }

  if (isMeds) {
    detailTitle.textContent = "История приёмов";
    try {
      const [pills, injections] = await Promise.all([
        apiFetch(`/therapy/history`, { method: "GET" }),
        apiFetch(`/therapy/injections`, { method: "GET" }),
      ]);
      const statusLabel = { on_time: "вовремя", late: "с опозданием", no_schedule: "" };

      const pillItems = (Array.isArray(pills) ? pills : []).map(r => ({
        label: `${r.name}${r.dose ? " " + r.dose : ""}`,
        dateDisplay: formatTime(r.taken_at),
        sortKey: r.taken_at,
        status: statusLabel[r.status] || "",
        isInjection: false,
      }));
      // У уколов в базе есть только дата (без точного времени), поэтому
      // порядок среди событий одного дня — приблизительный.
      const injectionItems = (Array.isArray(injections) ? injections : []).map(r => ({
        label: `💉 ${r.drug}${r.dose ? " " + r.dose : ""}`,
        dateDisplay: formatTime(r.date),
        sortKey: `${r.date}T12:00:00`,
        status: "",
        isInjection: true,
      }));

      const allItems = [...pillItems, ...injectionItems].sort((a, b) =>
        new Date(b.sortKey) - new Date(a.sortKey)
      );

      if (!allItems.length) {
        detailValue.textContent = "—";
        detailHistoryList.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">Записей пока нет</div>`;
        return;
      }

      detailValue.textContent = allItems[0].label;
      detailHistoryList.innerHTML = allItems.map(r => `
        <div class="history-row">
          <span class="h-date">${r.dateDisplay} — ${r.label}</span>
          <span class="h-val" style="color:${r.status === 'с опозданием' ? 'var(--danger)' : 'var(--text-dim)'};">${r.status}</span>
        </div>
      `).join("");
    } catch (e) {
      detailHistoryList.innerHTML = `<div style="color:var(--text-dim);">Не удалось загрузить данные</div>`;
    }
    return;
  }

  try {
    if (currentMetricIsBp) {
      const [sysData, diaData] = await Promise.all([
        apiFetch(`/metric/history?field=bp_sys`, { method: "GET" }),
        apiFetch(`/metric/history?field=bp_dia`, { method: "GET" }),
      ]);
      const toPairs = (d) => (d?.points || []).map(p => [p.date, p.value]);
      currentMetricSeries = { sys: toPairs(sysData), dia: toPairs(diaData) };
      currentMetricMeta = {};
      currentMetricBands = { sys: CLINICAL_BANDS.bp_sys, dia: CLINICAL_BANDS.bp_dia };
      currentMetricBand = null;
      detailRange.textContent = "Ориентировочные диапазоны, не диагноз";
    } else {
      const data = await apiFetch(`/metric/history?field=${encodeURIComponent(field)}`, { method: "GET" });
      if (!data || data.error) throw new Error("bad response");
      currentMetricSeries = (data.points || []).map(p => [p.date, p.value]);
      currentMetricMeta = data;
      currentMetricBands = null;

      if (data.reference_low != null && data.reference_high != null) {
        currentMetricBand = { low: data.reference_low, high: data.reference_high, label: `референс: ${data.reference_low}–${data.reference_high}${data.unit ? " " + data.unit : ""}` };
      } else if (data.target_low != null && data.target_high != null) {
        currentMetricBand = { low: data.target_low, high: data.target_high, label: `цель: ${data.target_low}–${data.target_high}${data.unit ? " " + data.unit : ""}` };
      } else if (field === "pulse") {
        currentMetricBand = CLINICAL_BANDS.pulse;
        detailRange.textContent = "Ориентировочный диапазон, не диагноз";
      } else {
        currentMetricBand = null;
      }
    }
  } catch (e) {
    detailChartWrap.innerHTML = `<div style="color:var(--text-dim);">Не удалось загрузить данные</div>`;
    return;
  }

  renderDetailChart(currentMetricSeries);
}

periodTabs.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-period]");
  if (!btn) return;
  periodTabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderDetailChart(filterByPeriod(currentMetricSeries, btn.dataset.period));
});

refreshDashboard();

// --- Полоска дней / месяц / тап по дню ---
function toISODate(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

const WD_LABELS = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
let activeDaysCache = new Set();
let calendarMonthShown = new Date();

async function loadActiveDays(year, month) {
  try {
    const data = await apiFetch(`/calendar?year=${year}&month=${month}`, { method: "GET" });
    activeDaysCache = new Set(data.active_days || []);
  } catch (e) {
    activeDaysCache = new Set();
  }
}

function renderWeekRow() {
  const weekRow = document.getElementById("week-row");
  const today = new Date();
  const todayIso = toISODate(today);
  const dow = (today.getDay() + 6) % 7; // 0=Пн
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow);

  weekRow.innerHTML = "";
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const iso = toISODate(d);
    const el = document.createElement("div");
    el.className = "week-day" + (iso === todayIso ? " today" : "") + (activeDaysCache.has(iso) ? " has-activity" : "");
    el.innerHTML = `<span class="wd-label">${WD_LABELS[i]}</span><span class="wd-num">${d.getDate()}</span><span class="wd-dot"></span>`;
    el.addEventListener("click", () => openDayDetail(iso));
    weekRow.appendChild(el);
  }
}

function renderMonthGrid() {
  const grid = document.getElementById("month-grid");
  const year = calendarMonthShown.getFullYear();
  const month = calendarMonthShown.getMonth(); // 0-based
  const todayIso = toISODate(new Date());

  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() + 6) % 7; // Пн=0
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(firstOfMonth.getDate() - startOffset);

  grid.innerHTML = "";
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const iso = toISODate(d);
    const otherMonth = d.getMonth() !== month;
    const el = document.createElement("div");
    el.className = "month-cell" + (otherMonth ? " other-month" : "") + (iso === todayIso ? " today" : "") + (activeDaysCache.has(iso) ? " has-activity" : "");
    el.innerHTML = `<span class="mc-num">${d.getDate()}</span><span class="mc-dot"></span>`;
    el.addEventListener("click", () => openDayDetail(iso));
    grid.appendChild(el);
  }
}

async function initCalendar() {
  const now = new Date();
  calendarMonthShown = now;
  await loadActiveDays(now.getFullYear(), now.getMonth() + 1);
  renderWeekRow();
  renderMonthGrid();
}

const calendarToggle = document.getElementById("calendar-toggle");
const calendarMonthEl = document.getElementById("calendar-month");
calendarToggle.addEventListener("click", () => {
  const opening = !calendarMonthEl.classList.contains("open");
  calendarMonthEl.classList.toggle("open");
  calendarToggle.classList.toggle("open");
  if (opening) renderMonthGrid();
});

function formatDayLabel(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
}

async function openDayDetail(iso) {
  openMetricDetail(`__day__:${iso}`, formatDayLabel(iso));
}

initCalendar();

// --- Напоминания: бегущая строка + список с отменой ---
const reminderTicker = document.getElementById("reminder-ticker");
const reminderTrack = document.getElementById("reminder-ticker-track");
let lastReminders = { missing_today: [], injections: [] };

const ONBOARDING_TIPS = [
  "Скажи голосом «вес 80» — запишу",
  "Сфотографируй тонометр — распознаю сам",
  "Точки под датами — показывают, где была активность",
  "Тапни на любой кружок — откроется график",
  "Пришли фото анализов или еды — разберу автоматически",
];

const STATUS_TIPS = [
  "Все приёмы сегодня отмечены",
  "Тапни на день в календаре — увидишь, что было",
  "Разверни месяц стрелкой справа от дат",
  "Кружок «Анализы» — все твои показатели в одном месте",
];

function hasAnyRealData() {
  const latest = lastDashboardData?.latest || {};
  const today = lastDashboardData?.today || {};
  return latest.weight_kg != null || latest.blood_pressure != null ||
         latest.resting_pulse != null || latest.testosterone != null ||
         today.calories != null || today.steps != null ||
         !!today.last_medication;
}

async function refreshReminders() {
  try {
    lastReminders = await apiFetch(`/reminders`, { method: "GET" });
  } catch (e) {
    lastReminders = { missing_today: [], injections: [] };
  }
  const parts = [];
  (lastReminders.missing_today || []).forEach(m => parts.push(`Не принял: ${m.med_name}`));
  (lastReminders.injections || []).forEach(i => {
    if (i.days_left <= 0) parts.push(`Пора укол: ${i.compound}`);
    else parts.push(`До укола ${i.compound}: ${i.days_left} дн.`);
  });

  reminderTicker.classList.add("show");

  if (parts.length) {
    reminderTrack.style.color = "var(--danger)";
    reminderTrack.innerHTML = parts.map(p => `<span>${p}</span>`).join("");
    return;
  }

  const fallback = hasAnyRealData() ? STATUS_TIPS : ONBOARDING_TIPS;
  reminderTrack.style.color = "var(--text-dim)";
  reminderTrack.innerHTML = fallback.map(p => `<span>${p}</span>`).join("");
}

reminderTicker.addEventListener("click", () => {
  openMetricDetail("__reminders__", "Напоминания");
});

refreshDashboard().then(refreshReminders);

function showToast(text, ms = 2500) {
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), ms);
}

function scrollFeedDown() {
  feed.scrollTop = feed.scrollHeight;
}

function addUserCard(text) {
  const el = document.createElement("div");
  el.className = "card user";
  el.textContent = text;
  feed.appendChild(el);
  scrollFeedDown();
}

function addTextCard(text, transcript) {
  const el = document.createElement("div");
  el.className = "card system";
  el.innerHTML = (transcript ? `<div class="transcript">«${transcript}»</div>` : "") +
    `<div>${text}</div>`;
  feed.appendChild(el);
  scrollFeedDown();
}

// --- Голосовой ответ ---
// iOS разрешает audio.play() без ограничений только если он вызван прямо в обработчике
// нажатия пользователя. Поэтому "разблокируем" один и тот же Audio-объект в момент тапа
// на микрофон, а потом просто меняем ему src и снова play() — так iOS обычно пропускает.
const SILENT_WAV = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";
let replyAudio = null;

function unlockAudio() {
  try {
    replyAudio = new Audio(SILENT_WAV);
    replyAudio.play().catch(() => {});
  } catch (e) {}
}

function playVoiceReply(base64) {
  if (!base64) return;
  try {
    if (replyAudio) {
      replyAudio.src = "data:audio/mpeg;base64," + base64;
      replyAudio.play().catch(() => {
        // если даже разблокированный объект не смог — пробуем создать новый как fallback
        new Audio("data:audio/mpeg;base64," + base64).play().catch(() => {});
      });
    } else {
      new Audio("data:audio/mpeg;base64," + base64).play().catch(() => {});
    }
  } catch (e) {}
}

// --- SVG-график ---
function addChartCard(field, series) {
  const el = document.createElement("div");
  el.className = "card system chart-wrap";

  const points = (series || []).map(p => Array.isArray(p) ? p : [p.date, p.value]);
  if (!points.length) {
    el.innerHTML = `<div class="card-title">${field}</div><div>Нет данных</div>`;
    feed.appendChild(el);
    scrollFeedDown();
    return;
  }

  const values = points.map(p => parseFloat(p[1]));
  const min = Math.min(...values);
  const max = Math.max(...values);
  const pad = (max - min) * 0.15 || 1;
  const yMin = min - pad, yMax = max + pad;
  const W = 300, H = 100;

  const coords = points.map((p, i) => {
    const x = points.length === 1 ? W / 2 : (i / (points.length - 1)) * W;
    const y = H - ((parseFloat(p[1]) - yMin) / (yMax - yMin)) * H;
    return [x, y];
  });
  const pathD = coords.map((c, i) => (i === 0 ? "M" : "L") + c[0].toFixed(1) + "," + c[1].toFixed(1)).join(" ");
  const dots = coords.map(c => `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="2.5" fill="#4FB8A6"/>`).join("");

  const last = points[points.length - 1];
  const first = points[0];

  el.innerHTML = `
    <div class="card-title">${field}</div>
    <div class="chart-value">${last[1]}</div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path d="${pathD}" fill="none" stroke="#4FB8A6" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
      ${dots}
    </svg>
    <div class="chart-meta"><span>${first[0]}</span><span>${last[0]}</span></div>
  `;
  feed.appendChild(el);
  scrollFeedDown();
}

// --- Confirm-карточки (vitals / labs / food) ---
function addConfirmCard(type, payload) {
  const el = document.createElement("div");
  el.className = "card system";

  let title = "Проверь и сохрани";
  let fieldsHtml = "";
  let fieldKeys = [];

  if (type === "vitals_confirm") {
    title = "Показатели с фото";
    const map = { weight: "Вес, кг", bp_sys: "Давление сист.", bp_dia: "Давление диаст.", pulse: "Пульс", steps: "Шаги" };
    fieldKeys = Object.keys(map).filter(k => payload[k] !== null && payload[k] !== undefined);
    fieldsHtml = fieldKeys.map(k =>
      `<div class="field-row"><label>${map[k]}</label><input data-key="${k}" value="${payload[k]}"></div>`
    ).join("");
  } else if (type === "labs_confirm") {
    title = "Анализы с фото";
    fieldsHtml = (payload.results || []).map((r, i) =>
      `<div class="field-row"><label>${r.test_name}</label><input data-idx="${i}" data-key="value" value="${r.value}"></div>`
    ).join("");
  } else if (type === "food_confirm") {
    title = payload.dish_name || "Еда с фото";
    const map = { calories: "Калории", protein_g: "Белки, г", fat_g: "Жиры, г", carbs_g: "Углеводы, г" };
    fieldKeys = Object.keys(map);
    fieldsHtml = fieldKeys.map(k =>
      `<div class="field-row"><label>${map[k]}</label><input data-key="${k}" value="${payload[k]}"></div>`
    ).join("");
  }

  el.innerHTML = `
    <div class="card-title">${title}</div>
    <div class="fields">${fieldsHtml}</div>
    <div class="card-actions">
      <button class="btn btn-primary">Сохранить</button>
      <button class="btn btn-ghost">Отмена</button>
    </div>
  `;

  const [saveBtn, cancelBtn] = el.querySelectorAll("button");
  saveBtn.onclick = async () => {
    el.querySelectorAll("input").forEach(input => {
      const val = parseFloat(input.value.replace(",", ".")) || input.value;
      if (type === "labs_confirm") {
        payload.results[parseInt(input.dataset.idx)][input.dataset.key] = val;
      } else {
        payload[input.dataset.key] = val;
      }
    });
    saveBtn.disabled = true;
    saveBtn.textContent = "Сохраняю...";
    const res = await apiFetch("/photo/confirm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type, payload }),
    });
    el.remove();
    if (res.saved) {
      addTextCard("✅ Сохранено");
      refreshDashboard();
    } else {
      addTextCard("Не удалось сохранить, попробуй ещё раз");
    }
  };
  cancelBtn.onclick = () => el.remove();

  feed.appendChild(el);
  scrollFeedDown();
}

function handleApiResponse(data) {
  if (data.type === "text") {
    addTextCard(data.payload.text, data.transcript);
    playVoiceReply(data.audio_base64);
    refreshDashboard();
  } else if (data.type === "chart") {
    addChartCard(data.payload.field, data.payload.series);
    playVoiceReply(data.audio_base64);
  } else if (["vitals_confirm", "labs_confirm", "food_confirm"].includes(data.type)) {
    addConfirmCard(data.type, data.payload);
  } else if (data.type === "unrecognized") {
    addTextCard("Не смог распознать. Попробуй другое фото или файл.");
  } else {
    addTextCard("Хм, не понял ответ сервера.");
  }
}

// --- Голос ---
const micBtn = document.getElementById("mic-btn");
let mediaRecorder, audioChunks = [], isRecording = false;

micBtn.onclick = async () => {
  if (!isRecording) {
    unlockAudio();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: "audio/webm" });
        showToast("Распознаю...");
        const form = new FormData();
        form.append("file", blob, "voice.webm");
        const res = await apiFetch("/voice", { method: "POST", body: form });
        toast.classList.remove("show");
        handleApiResponse(res);
      };
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add("recording");
      micBtn.textContent = "⏹";
    } catch (e) {
      showToast("Нет доступа к микрофону");
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
  }
};

async function uploadPhoto(file) {
  showToast("Смотрю на фото...");
  const form = new FormData();
  form.append("file", file);
  const res = await apiFetch("/photo", { method: "POST", body: form });
  toast.classList.remove("show");
  handleApiResponse(res);
}

async function uploadFile(file) {
  showToast("Читаю файл...");
  const form = new FormData();
  form.append("file", file);
  const res = await apiFetch("/file", { method: "POST", body: form });
  toast.classList.remove("show");
  handleApiResponse(res);
}

document.getElementById("input-camera").onchange = (e) => {
  if (e.target.files[0]) uploadPhoto(e.target.files[0]);
  e.target.value = "";
};
document.getElementById("input-gallery").onchange = (e) => {
  if (e.target.files[0]) uploadPhoto(e.target.files[0]);
  e.target.value = "";
};
document.getElementById("input-file").onchange = (e) => {

  e.target.value = "";
};
